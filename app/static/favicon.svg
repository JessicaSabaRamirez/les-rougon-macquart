<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ink background with rounded corners -->
  <rect width="32" height="32" rx="3.5" fill="#1a1208"/>
  <!-- Gold border -->
  <rect x="1" y="1" width="30" height="30" rx="3" fill="none" stroke="#b8922a" stroke-width="0.75"/>

  <!-- Family tree: ancestor (filled) at top, two branch nodes (outlined) below -->

  <!-- Trunk: ancestor down to crossbar -->
  <line x1="16" y1="12.5" x2="16" y2="17" stroke="#d4b060" stroke-width="1.4"/>
  <!-- Crossbar -->
  <line x1="9.5" y1="17" x2="22.5" y2="17" stroke="#d4b060" stroke-width="1.4"/>
  <!-- Left branch down -->
  <line x1="9.5" y1="17" x2="9.5" y2="21" stroke="#d4b060" stroke-width="1.4"/>
  <!-- Right branch down -->
  <line x1="22.5" y1="17" x2="22.5" y2="21" stroke="#d4b060" stroke-width="1.4"/>

  <!-- Ancestor node (Adélaïde Fouque) — filled -->
  <circle cx="16" cy="9" r="3.5" fill="#b8922a"/>

  <!-- Left child (Rougon branch) — outlined -->
  <circle cx="9.5" cy="24" r="3" fill="#1a1208" stroke="#b8922a" stroke-width="1.4"/>

  <!-- Right child (Macquart branch) — outlined -->
  <circle cx="22.5" cy="24" r="3" fill="#1a1208" stroke="#b8922a" stroke-width="1.4"/>
</svg>
